name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        id: check
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✓ VPS secrets present — will deploy"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::VPS secrets missing — run vps-setup.sh on your VPS"
            echo ""
            echo "⚠️  VPS_HOST or VPS_SSH_KEY not configured in GitHub Secrets."
            echo ""
            echo "One-command VPS setup (SSH into your VPS and run):"
            echo "  curl -sSL https://raw.githubusercontent.com/whogf22/cardxc-ai-company/main/scripts/vps-setup.sh | bash"
            echo ""
            echo "Then add the printed VPS_HOST / VPS_USER / VPS_SSH_KEY / VPS_PORT to:"
            echo "  https://github.com/whogf22/cardxc-ai-company/settings/secrets/actions"
          fi

      - name: Notify — secrets missing
        if: steps.check.outputs.ready == 'false'
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          curl -s "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "text=⚠️ *VPS secrets missing* — deploy skipped.%0A%0ARun on your VPS:%0A\`\`\`%0Acurl -sSL https://raw.githubusercontent.com/whogf22/cardxc-ai-company/main/scripts/vps-setup.sh | bash%0A\`\`\`" || true

      - name: Deploy via SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            [ -z "$APP_DIR" ] && APP_DIR="/var/www/cardxc-ai-company"
            if [ ! -d "$APP_DIR" ]; then
              echo "⚠️  $APP_DIR missing — run install.sh on VPS first"
              exit 1
            fi
            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main
            npm ci --omit=dev || npm install --production=false
            pm2 restart cardxc-ai || pm2 start ecosystem.config.cjs || pm2 start src/index.js --name cardxc-ai
            pm2 save
            echo "✓ Deployed $(date)"

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram not configured — skipping"
            exit 0
          fi
          curl -s "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=$ICON Deploy $STATUS $SHORT_SHA — $MSG" || true
