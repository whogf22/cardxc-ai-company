name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "✓ Secrets present — deploy will run"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "⏭  VPS secrets not configured — skipping deploy (this is OK before first VPS setup)"
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/var/www/cardxc-ai-company"; fi
            if [ ! -d "$APP_DIR" ]; then
              echo "⚠️  $APP_DIR missing — run install.sh on VPS first"
              exit 1
            fi
            cd "$APP_DIR"
            echo "→ git pull origin main"
            git fetch --all
            git reset --hard origin/main
            echo "→ npm ci"
            npm ci --omit=dev || npm install --production=false
            echo "→ pm2 restart"
            pm2 restart cardxc-ai || pm2 start ecosystem.config.cjs || pm2 start src/index.js --name cardxc-ai
            pm2 save
            echo "✓ Deployed at $(date)"

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TG secrets not set — skipping notification"
            exit 0
          fi
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          TEXT="$ICON Deploy $STATUS \`$SHORT_SHA\`
${MSG}"
          curl -s "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "text=$TEXT" || true
