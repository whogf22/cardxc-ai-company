name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          APP_DIR: ${{ secrets.APP_DIR || '/home/cardxc/cardxc-ai-company' }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash <<EOF
            set -e
            cd "$APP_DIR"
            echo "→ Pulling latest…"
            git fetch --all
            git reset --hard origin/main
            echo "→ Installing deps…"
            npm install --production=false
            echo "→ Restarting pm2…"
            pm2 restart cardxc-ai || pm2 start ecosystem.config.cjs
            pm2 save
            echo "✓ Deployed at \$(date)"
          EOF

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
          MSG: ${{ github.event.head_commit.message }}
        run: |
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          TEXT="$ICON *Deploy $STATUS* \`$SHORT_SHA\`%0A_${MSG}_"
          curl -s "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d chat_id="$TG_CHAT" \
            -d parse_mode=Markdown \
            -d text="$TEXT" || true
