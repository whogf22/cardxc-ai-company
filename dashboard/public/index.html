<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CardXC AI Company — Dashboard</title>
<style>
  :root {
    --bg: #0a0b0f;
    --panel: #12141b;
    --border: #1f2330;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #00d4aa;
    --warn: #f5a524;
    --err: #ef4444;
    --ok: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase;
    color: var(--muted); letter-spacing: 0.06em; margin-bottom: 12px; }
  .agent-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px dashed var(--border);
  }
  .agent-row:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--ok); display: inline-block; margin-right: 8px; }
  .dot.idle { background: var(--muted); }
  .dot.busy { background: var(--warn); }
  .dot.err  { background: var(--err); }
  button {
    background: transparent; color: var(--accent); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  pre {
    background: #06070a; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 12px; line-height: 1.55; max-height: 500px;
    overflow: auto; color: #c5cbd8;
  }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
  .stat { background: #0e1017; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .stat .v { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: rgba(0,212,170,0.1); color: var(--accent); margin-left: 6px; }
</style>
</head>
<body>
  <h1>CardXC AI Company <span class="tag">LIVE</span></h1>
  <div class="sub">Autonomous agent team — cardxc.online · getotps.com · writtingexpert.com</div>

  <div class="stat-row">
    <div class="stat"><div class="v" id="stat-uptime">—</div><div class="l">Uptime (s)</div></div>
    <div class="stat"><div class="v" id="stat-agents">—</div><div class="l">Agents</div></div>
    <div class="stat"><div class="v" id="stat-logs">—</div><div class="l">Log Lines</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Agents</h2>
      <div id="agents"></div>
    </div>

    <div class="card">
      <h2>Live Log Stream</h2>
      <pre id="logs">Loading…</pre>
    </div>
  </div>

<script>
async function j(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}
async function refresh() {
  try {
    const h = await j('/api/health');
    document.getElementById('stat-uptime').textContent = Math.floor(h.uptime);

    const a = await j('/api/agents');
    document.getElementById('stat-agents').textContent = a.agents.length;
    document.getElementById('agents').innerHTML = a.agents.map(x =>
      `<div class="agent-row">
        <div><span class="dot ${x.status || 'idle'}"></span><b>${x.name}</b>
          <span style="color:var(--muted); font-size: 12px">${x.role}</span>
        </div>
        <button onclick="runAgent('${x.key}')">Run</button>
      </div>`
    ).join('');

    const l = await j('/api/logs');
    document.getElementById('stat-logs').textContent = (l.lines || []).length;
    document.getElementById('logs').textContent = (l.lines || []).slice(-80).join('\n');
  } catch (e) {
    document.getElementById('logs').textContent = 'Connection lost: ' + e.message;
  }
}
async function runAgent(key) {
  const r = await j('/api/run/' + key, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
  alert('Ran ' + key + ': ' + JSON.stringify(r).slice(0, 400));
  refresh();
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
